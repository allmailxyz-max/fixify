<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fixify — Home Services Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020B16;--surf1:#061220;--surf2:#0A1B2E;--card:rgba(8,22,40,0.92);
  --glass:rgba(255,255,255,0.03);--border:rgba(0,212,255,0.15);
  --bw:rgba(255,255,255,0.07);--bh:rgba(255,255,255,0.13);
  --cyan:#00D4FF;--cdim:rgba(0,212,255,0.11);
  --purple:#7B2FFF;--pdim:rgba(123,47,255,0.12);
  --green:#00E5A0;--gdim:rgba(0,229,160,0.1);
  --orange:#FF6B35;--red:#FF3860;--amber:#FFB547;
  --tx:#fff;--txs:rgba(255,255,255,0.62);--txm:rgba(255,255,255,0.33);
  --g1:linear-gradient(135deg,#00D4FF,#7B2FFF);
  --g2:linear-gradient(135deg,#00E5A0,#00D4FF);
  --g3:linear-gradient(135deg,#FF6B35,#FF3860);
  --g4:linear-gradient(135deg,#7B2FFF,#FF3860);
  --g5:linear-gradient(135deg,#FFB547,#FF6B35);
  --fh:'Exo 2','Rajdhani',system-ui,sans-serif;
  --fb:'Outfit','Nunito',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,212,255,.4)}

/* Keyframes */
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,160,.45)}50%{box-shadow:0 0 0 7px rgba(0,229,160,0)}}
@keyframes fade-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes progress{from{width:0}to{width:var(--pw)}}
@keyframes glow{0%,100%{opacity:.3}50%{opacity:.9}}

/* Layout */
#app{display:flex;height:100vh;position:relative;z-index:1}
.glow-bg{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}

/* Sidebar */
#sidebar{
  width:240px;flex-shrink:0;background:var(--surf1);
  border-right:1px solid var(--bw);display:flex;flex-direction:column;
  height:100vh;overflow-y:auto;position:relative;z-index:2;
}
.logo-wrap{padding:24px 22px 20px;border-bottom:1px solid var(--bw)}
.logo-text{font-family:var(--fh);font-weight:900;font-size:26px;letter-spacing:.12em;
  background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{color:var(--txm);font-size:9px;letter-spacing:.2em;margin-top:4px;font-weight:600}
.user-card{padding:14px 18px;border-bottom:1px solid var(--bw);display:flex;gap:10px;align-items:center}
nav{padding:12px 10px;flex:1}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;
  border-radius:12px;cursor:pointer;margin-bottom:3px;
  color:var(--txs);font-weight:500;font-size:13px;
  border-left:3px solid transparent;transition:all .2s;user-select:none;
}
.nav-item:hover{background:rgba(0,212,255,.07);color:var(--cyan)}
.nav-item.active{background:rgba(0,212,255,.1);color:var(--cyan);font-weight:700;border-left-color:var(--cyan)}
.nav-item .badge{margin-left:auto;background:var(--red);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800;color:#fff}
.nav-bottom{padding:14px 18px;border-top:1px solid var(--bw);display:flex;gap:8px}
.nav-bottom-btn{width:34px;height:34px;border-radius:10px;cursor:pointer;background:var(--glass);border:1px solid var(--bw);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s}
.nav-bottom-btn:hover{border-color:var(--cyan)}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{
  padding:20px 32px;border-bottom:1px solid var(--bw);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surf1);backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:10;flex-shrink:0;
}
#topbar h1{font-family:var(--fh);font-weight:800;font-size:22px;color:var(--tx)}
#topbar p{margin:3px 0 0;font-size:13px;color:var(--txm)}
.topbar-right{display:flex;gap:10px;align-items:center}
.icon-btn{width:38px;height:38px;border-radius:12px;background:var(--glass);border:1px solid var(--bw);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;position:relative;transition:all .2s;flex-shrink:0}
.icon-btn:hover{border-color:var(--cyan)}
.notif-dot{position:absolute;top:7px;right:7px;width:8px;height:8px;border-radius:50%;background:var(--red)}
#content{flex:1;overflow-y:auto}
.screen{animation:fade-up .3s ease both}

/* Cards */
.gcard{background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--bw);border-radius:16px;padding:20px;transition:all .25s}
.gcard.hoverable:hover{border-color:rgba(0,212,255,.35);transform:translateY(-2px);box-shadow:0 8px 40px rgba(0,212,255,.08)}
.gcard.clickable{cursor:pointer}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;color:#fff;font-family:var(--fb);font-weight:700;cursor:pointer;letter-spacing:.02em;transition:all .2s;font-size:14px;padding:11px 22px}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0);filter:brightness(.95)}
.btn-sm{padding:7px 16px;font-size:12px;border-radius:10px}
.btn-g1{background:var(--g1)}
.btn-g2{background:var(--g2)}
.btn-g3{background:var(--g3)}
.btn-g4{background:var(--g4)}
.btn-ghost{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.44);border-radius:12px;color:var(--cyan);font-family:var(--fb);font-weight:700;cursor:pointer;padding:11px 22px;font-size:14px;transition:all .2s}
.btn-ghost:hover{background:rgba(0,212,255,.18);border-color:rgba(0,212,255,.7)}
.btn-ghost-sm{padding:7px 16px;font-size:12px;border-radius:10px}
.btn-danger{background:rgba(255,56,96,.1);border:1px solid rgba(255,56,96,.4);color:var(--red);font-family:var(--fb);font-weight:700;cursor:pointer;border-radius:11px;padding:10px 0;font-size:13px;transition:all .2s}
.btn-danger:hover{background:rgba(255,56,96,.2)}
.btn-success{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.4);color:var(--green);font-family:var(--fb);font-weight:700;cursor:pointer;border-radius:11px;padding:10px 0;font-size:13px;transition:all .2s}
.btn-success:hover{background:rgba(0,229,160,.2)}
.btn-full{width:100%}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:var(--fh);border:2px solid var(--bw);flex-shrink:0;position:relative}
.online-dot{position:absolute;border-radius:50%;background:var(--green);border:2px solid var(--surf1);animation:pulse 2s infinite}
.offline-dot{position:absolute;border-radius:50%;background:var(--txm);border:2px solid var(--surf1)}

/* Inputs */
.inp{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--tx);font-family:var(--fb);font-size:13px;width:100%;transition:border-color .2s}
.inp:focus{outline:none;border-color:var(--cyan)}
.inp::placeholder{color:var(--txm)}
textarea.inp{resize:none;line-height:1.65}

/* Stars */
.stars{display:flex;gap:1px}
.star{font-size:13px}

/* Toggle */
.toggle{width:48px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:all .3s;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 2px 6px rgba(0,0,0,.4)}

/* Divider */
.div{height:1px;background:var(--bw);margin:16px 0}

/* Grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.g4s{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g3a{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.flex{display:flex;align-items:center;gap:10px}
.flex-col{display:flex;flex-direction:column;gap:12px}
.spacer{flex:1}

/* Tabs */
.tab-bar{display:flex;gap:6px;border-bottom:1px solid var(--bw);padding:20px 32px 0}
.tab-btn{padding:11px 22px;border-radius:12px 12px 0 0;border:none;background:transparent;border-top:2px solid transparent;color:var(--txs);font-family:var(--fb);font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--card);border-top-color:var(--cyan);color:var(--cyan)}
.tab-btn:not(.active):hover{color:var(--cyan)}

/* Section heading */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sh-title{font-family:var(--fh);font-weight:700;font-size:15px;color:var(--tx);letter-spacing:.02em}
.sh-title.lg{font-size:20px}
.sh-action{font-size:13px;color:var(--cyan);cursor:pointer;font-weight:600}

/* Hero banner */
.hero{margin:28px 32px 24px;border-radius:24px;padding:40px 44px;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(0,212,255,.07),rgba(123,47,255,.14));border:1px solid var(--border)}
.hero-scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.4),transparent);animation:scan 4s linear infinite}

/* Worker card */
.worker-card{padding:18px 20px}
.worker-card:hover{border-color:rgba(0,212,255,.35)!important;box-shadow:0 8px 40px rgba(0,212,255,.08)!important}

/* Chat bubbles */
.bubble-me{background:var(--g1);border-radius:18px 18px 4px 18px;padding:12px 16px;color:#fff;font-size:14px;line-height:1.55;max-width:70%;align-self:flex-end;white-space:pre-wrap}
.bubble-them{background:var(--card);border:1px solid var(--bw);border-radius:18px 18px 18px 4px;padding:12px 16px;color:#fff;font-size:14px;line-height:1.55;max-width:70%;align-self:flex-start;white-space:pre-wrap}
.bubble-sys{text-align:center;background:rgba(0,212,255,.1);border-radius:10px;padding:9px 16px;font-size:12px;color:var(--cyan);border:1px solid var(--border);align-self:stretch}

/* Map grid bg */
.map-grid{background-image:linear-gradient(var(--bw) 1px,transparent 1px),linear-gradient(90deg,var(--bw) 1px,transparent 1px);background-size:50px 50px}

/* Progress bar */
.prog-track{height:6px;background:var(--bw);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .8s ease}

/* Animations for special elements */
.float{animation:float 3s ease-in-out infinite}
.pulse-online{animation:pulse 2s infinite}

/* Category card */
.cat-card{background:var(--glass);border:1px solid var(--bw);border-radius:16px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .22s}
.cat-card:hover{transform:translateY(-3px) scale(1.02);border-color:rgba(255,255,255,.18)}

/* Step tracker */
.step-line{width:2px;height:28px;margin:4px auto;border-radius:2px;background:var(--g2)}
.step-line.inactive{background:var(--bw)}

/* Price quick select */
.price-quick{flex:1;padding:10px 0;border-radius:11px;text-align:center;cursor:pointer;font-size:14px;font-weight:700;border:1px solid var(--bw);background:var(--glass);color:var(--txs);transition:all .2s}
.price-quick:hover,.price-quick.sel{background:var(--cdim);border-color:var(--cyan);color:var(--cyan)}

/* Bar chart bar */
.bar{border-radius:6px 6px 0 0;transition:height .6s ease;border-bottom:none}

/* Responsive badge */
.urgency-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,181,71,.18);border:1px solid rgba(255,181,71,.45);color:var(--amber)}
</style>
</head>
<body>

<!-- Ambient glows -->
<div class="glow-bg" style="top:-100px;left:200px;width:500px;height:500px;background:rgba(0,212,255,.03)"></div>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="logo-wrap">
      <div class="logo-text">FIXIFY</div>
      <div class="logo-sub">HOME SERVICES PLATFORM</div>
    </div>
    <div class="user-card">

      <div>
        <div style="font-size:13px;font-weight:700;color:var(--tx)">Arjun Dev</div>

      </div>
    </div>
    <nav id="nav"></nav>
    <div class="nav-bottom">
      <div class="nav-bottom-btn">⚙️</div>
      <div class="nav-bottom-btn">🌙</div>

    <div id="topbar">

<script>
/* ── State ─────────────────────────────────────── */

const C = {

/* ── Data ─────────────────────────────────────── */

  {id:5,name:'Kavita Joshi',cat:'AC Repair',rating:4.9,jobs:198,price:'₹500–1500',online:false,exp:7,v:true,grad:C.g4,city:'Noida'},
];

const NAV_ITEMS = [
  {id:'Home',em:'🏠',lbl:'Home'},
  {id:'Workers',em:'👷',lbl:'Browse Workers'},
  {id:'Chat',em:'💬',lbl:'Messages',badge:3},
  {id:'Booking',em:'📅',lbl:'Book Service'},
  {id:'Tracking',em:'📍',lbl:'Track Order'},
  {id:'Payment',em:'💳',lbl:'Payment'},
  {id:'Negotiation',em:'🤝',lbl:'Negotiation'},
  {id:'Rating',em:'⭐',lbl:'Reviews'},
  {id:'Dashboard',em:'⚡',lbl:'Worker Dashboard'},
  {id:'Admin',em:'🛡️',lbl:'Admin Panel'},

const META = {
  Home:{title:'Home',sub:'Welcome back, Arjun 👋'},
  Workers:{title:'Browse Workers',sub:'Find verified professionals near you'},
  Chat:{title:'Messages',sub:'Chat with your service workers'},
  Booking:{title:'Book a Service',sub:'Schedule at your convenience'},
  Tracking:{title:'Order Tracking',sub:'Live status of your booking #HS-2026-1847'},

  Rating:{title:'Rate & Review',sub:'Share your experience to help others'},

  Admin:{title:'Admin Panel',sub:'Platform overview & controls'},
};

const MSGS = [
  {from:'w',txt:'Hello! I\'m Rajesh. How can I help you today? 😊',t:'2:20 PM'},
  {from:'u',txt:'Hi! I have a pipe leak under my kitchen sink 🚿',t:'2:21 PM'},

  {from:'w',txt:'I can fix this within 1 hour.\n💰 Estimate: ₹350–450\n⏱ Arrival: 45 min',t:'2:23 PM',estimate:true},

  {label:'Request Sent',em:'📤',done:true},
  {label:'Worker Accepted',em:'✅',done:true},
  {label:'Scheduled',em:'📅',done:true},
  {label:'Worker on the Way',em:'🚗',done:true,active:true},

/* ── Helpers ──────────────────────────────────── */
function avatar(name, size, online, grad, extra='') {
  const ini = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const fs = Math.round(size * .33);
  let dot = '';
  if (online === true) dot = `<div class="online-dot" style="width:${Math.round(size*.25)}px;height:${Math.round(size*.25)}px;bottom:1px;right:1px"></div>`;
  else if (online === false) dot = `<div class="offline-dot" style="width:${Math.round(size*.25)}px;height:${Math.round(size*.25)}px;bottom:1px;right:1px;background:var(--txm)"></div>`;
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${grad};font-size:${fs}px;${extra}">${ini}${dot}</div>`;
}

function pill(txt, col) {
  return `<span class="pill" style="background:${col}1E;border:1px solid ${col}3A;color:${col}">${txt}</span>`;
}

function stars(r, sz=13) {
  return `<div class="stars">${[1,2,3,4,5].map(i=>`<span class="star" style="font-size:${sz}px;color:${i<=Math.round(r)?'var(--amber)':'var(--txm)'}">${i<=r?'★':'☆'}</span>`).join('')}</div>`;
}

function divider() { return '<div class="div"></div>'; }

function shead(title, action='', onClick='', large=false) {
  return `<div class="sh"><span class="sh-title${large?' lg':''}">${title}</span>${action?`<span class="sh-action" onclick="${onClick}">${action}</span>`:''}</div>`;
}

function toggle(id, on) {
  return `<div class="toggle" id="${id}" onclick="toggleHandler('${id}')" style="background:${on?'var(--green)':'rgba(255,255,255,.08)'};border:1px solid ${on?'var(--green)':'var(--bw)'}"><div class="toggle-thumb" style="left:${on?25:3}px"></div></div>`;
}

function progBar(pct, grad='var(--g2)') {
  return `<div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${grad}"></div></div>`;
}

function gcard(inner, extra='', cls='') {
  return `<div class="gcard ${cls}" style="${extra}">${inner}</div>`;
}

function btn(txt, cls='btn-g1', extra='', onClick='') {
  return `<button class="btn ${cls}" style="${extra}" onclick="${onClick}">${txt}</button>`;
}

function ghostBtn(txt, extra='', onClick='') {
  return `<button class="btn-ghost" style="${extra}" onclick="${onClick}">${txt}</button>`;
}

/* ── Navigate ─────────────────────────────────── */
function go(screen) {
  state.screen = screen;
  render();
  document.getElementById('content').scrollTop = 0;
}

function toggleHandler(id) {
  if (id === 'toggle-urgent') { state.bookUrgent = !state.bookUrgent; renderContent(); }
  if (id === 'toggle-avail') { state.dashAvail = !state.dashAvail; renderContent(); }
}

/* ── Render Shell ─────────────────────────────── */
function renderShell() {
  // Sidebar avatar
  document.getElementById('sidebar-avatar').innerHTML = avatar('Arjun Dev', 38, true, C.g1);
  // Topbar avatar
  document.getElementById('topbar-avatar').innerHTML = avatar('Arjun Dev', 38, undefined, C.g1);
  // Nav
  document.getElementById('nav').innerHTML = NAV_ITEMS.map(n =>
    `<div class="nav-item${state.screen===n.id?' active':''}" onclick="go('${n.id}')">
      <span style="font-size:15px">${n.em}</span><span>${n.lbl}</span>
      ${n.badge?`<span class="badge">${n.badge}</span>`:''}
    </div>`
  ).join('');
}

function renderTopbar() {
  const m = META[state.screen] || {title:state.screen, sub:''};
  document.getElementById('page-title').textContent = m.title;
  document.getElementById('page-sub').textContent = m.sub;
}

function renderContent() {
  const c = document.getElementById('content');
  const renderers = {
    Home, Workers, Chat, Booking, Tracking, Payment, Negotiation, Rating, Dashboard, Admin
  };
  const fn = renderers[state.screen];
  c.innerHTML = `<div class="screen" style="min-height:100%">${fn ? fn() : ''}</div>`;
  bindEvents();
}

function render() {
  renderShell();
  renderTopbar();
  renderContent();
}

function bindEvents() {
  // Payment methods
  document.querySelectorAll('.pay-method').forEach(el => {
    el.addEventListener('click', () => {
      state.payMethod = el.dataset.method;
      renderContent();
    });
  });
  // Book date
  document.querySelectorAll('.date-btn').forEach(el => {
    el.addEventListener('click', () => { state.bookDate = +el.dataset.d; renderContent(); });
  });
  // Book time
  document.querySelectorAll('.time-btn').forEach(el => {
    el.addEventListener('click', () => { state.bookTime = el.dataset.t; renderContent(); });
  });
  // Stars
  document.querySelectorAll('.star-btn').forEach(el => {
    el.addEventListener('click', () => { state.stars = +el.dataset.s; renderContent(); });
  });
  // Review tags
  document.querySelectorAll('.rev-tag').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.tag;
      state.reviewTags.has(t) ? state.reviewTags.delete(t) : state.reviewTags.add(t);
      renderContent();
    });
  });
  // Worker list click
  document.querySelectorAll('.wlist-item').forEach(el => {
    el.addEventListener('click', () => { state.workerSel = +el.dataset.w; renderContent(); });
  });
  // Worker tabs
  document.querySelectorAll('.wtab').forEach(el => {
    el.addEventListener('click', () => { state.workerTab = el.dataset.t; renderContent(); });
  });
  // Dash tabs
  document.querySelectorAll('.dtab').forEach(el => {
    el.addEventListener('click', () => { state.dashTab = el.dataset.t; renderContent(); });
  });
  // Admin tabs
  document.querySelectorAll('.atab').forEach(el => {
    el.addEventListener('click', () => { state.adminTab = el.dataset.t; renderContent(); });
  });
  // Cat filter
  document.querySelectorAll('.cat-filter').forEach(el => {
    el.addEventListener('click', () => { state.catFilter = el.dataset.c; renderContent(); });
  });
  // Neg counter
  const negInput = document.getElementById('neg-input');
  if (negInput) negInput.addEventListener('input', e => { state.negCounter = e.target.value; });
  document.querySelectorAll('.neg-quick').forEach(el => {
    el.addEventListener('click', () => { state.negCounter = el.dataset.p; renderContent(); });
  });
  // Review textarea
  const revText = document.getElementById('rev-text');
  if (revText) revText.addEventListener('input', e => {
    state.reviewTxt = e.target.value;
    const cnt = document.getElementById('rev-count');
    if (cnt) cnt.textContent = e.target.value.length + '/500 chars';
  });
  // Chat input
  const chatInput = document.getElementById('chat-input');
  if (chatInput) chatInput.addEventListener('keydown', e => {
    if (e.key==='Enter') { state.chatMsg = ''; }
  });
}

            <span style="font-size:13px;font-weight:700;color:${col}">${pct}%</span>
          </div>
          <div class="prog-track" style="height:6px"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div>
        </div>`).join('')}
      </div>
    </div>`;
  } else if (state.adminTab==='workers') {
    tabContent = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <div style="font-family:var(--fh);font-weight:700;font-size:20px;color:var(--tx)">KYC Pending Approvals</div>
        <div style="font-size:13px;color:var(--txm);margin-top:3px">${pending.length} workers awaiting verification</div>
      </div>
      <div style="display:flex;gap:10px">
        ${ghostBtn('Bulk Approve','padding:9px 18px;font-size:12px','')}
        ${btn('Export CSV','btn-g1 btn-sm','','')}
      </div>
    </div>
    <div class="g3a">
      ${pending.map(w=>`
      <div class="gcard" style="border:1px solid rgba(255,181,71,.22);padding:20px">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px">
          ${avatar(w.name,50,undefined,w.grad)}
          <div style="flex:1">
            <div style="font-family:var(--fh);font-weight:700;font-size:16px;color:var(--tx)">${w.name}</div>
            <div style="font-size:12px;color:var(--txm);margin-top:3px">${w.cat} · ${w.city}</div>
            <div style="display:flex;gap:6px;margin-top:6px">${pill(w.id,C.amber)}${pill(w.date,'rgba(255,255,255,.3)')}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-danger" style="flex:1">✕ Reject</button>
          <button class="btn-success" style="flex:1">✓ Approve</button>
          <div class="icon-btn" style="flex-shrink:0">👁️</div>
        </div>
      </div>`).join('')}
    </div>`;
  } else if (state.adminTab==='analytics') {
    tabContent = `<div class="g2">
    ${[['Customer Signups','+234 this week','📈'],['Job Completion Rate','94.2%','✅'],['Avg Response Time','8.3 min','⚡'],['Refund Rate','1.2%','🔄']].map(([lbl,val,em])=>`
    <div class="gcard" style="padding:28px 32px;border:1px solid var(--border)">
      <div style="font-size:36px;margin-bottom:12px">${em}</div>
      <div style="font-family:var(--fh);font-weight:900;font-size:38px;color:var(--cyan);margin-bottom:6px">${val}</div>
      <div style="font-size:14px;color:var(--txm)">${lbl}</div>
    </div>`).join('')}</div>`;
  } else {
    tabContent = `<div class="flex-col" style="max-width:600px">
    ${[['💹','Commission Rate','10% per booking',true],['🔔','Push Notifications','Enabled for all events',false],['🛡️','Fraud Detection','AI monitoring active',false],['📣','Promotional Banners','3 active banners',false],['⚖️','Dispute Resolution','Auto-escalation after 48h',false],['🚨','Emergency Support','24/7 team online',false]].map(([em,lbl,desc,accent])=>`
    <div class="gcard hoverable clickable" style="padding:18px 22px;display:flex;gap:14px;align-items:center">
      <div style="width:46px;height:46px;border-radius:14px;flex-shrink:0;background:${accent?'var(--cdim)':'var(--glass)'};border:1px solid ${accent?'var(--cyan)':'var(--bw)'};display:flex;align-items:center;justify-content:center;font-size:22px">${em}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:15px;color:var(--tx)">${lbl}</div><div style="font-size:12px;color:var(--txm);margin-top:2px">${desc}</div></div>
      <span style="color:var(--cyan);font-weight:700;font-size:14px">Edit →</span>
    </div>`).join('')}</div>`;
  }

  return `
  <!-- Admin tabs -->
  <div class="tab-bar">
    ${adminTabs.map(([id,lbl])=>`<button class="tab-btn atab${state.adminTab===id?' active':''}" data-t="${id}">${lbl}</button>`).join('')}
  </div>
  <div style="padding:28px 32px">${tabContent}</div>`;
}

/* ── Init ─────────────────────────────────── */
render();
</script>
</body>
</html>
